<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi Stock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    header {
      background: #1a56db;
      color: white;
      width: 100%;
      max-width: 700px;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .icon { font-size: 2.2rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 2px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1.1rem; color: #1e293b; margin-bottom: 18px; font-weight: 700; }
    label { display: block; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 0.95rem; }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus, select:focus { outline: none; border-color: #1a56db; background: white; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }

    /* Bloc produit - utilisation */
    .produit-bloc {
      background: #f0f4ff;
      border: 2px dashed #a5b4fc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    /* Bloc produit - achat */
    .produit-bloc-achat {
      background: #f5f3ff;
      border: 2px dashed #c4b5fd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
    }
    .stock-info {
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: -12px;
      margin-bottom: 12px;
      min-height: 16px;
    }
    .add-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eff6ff;
      color: #1a56db;
      border: 2px dashed #93c5fd;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .add-btn:hover { background: #dbeafe; }
    .add-btn-achat {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f3ff;
      color: #7c3aed;
      border: 2px dashed #c4b5fd;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .add-btn-achat:hover { background: #ede9fe; }
    .submit-btn {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #15803d; }
    .submit-btn-achat {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn-achat:hover { background: #6d28d9; }
    .export-btn {
      background: #f59e0b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      margin-top: 12px;
    }
    .export-btn:hover { background: #d97706; }

    /* Filtres historique */
    .filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #e5e7eb;
      background: white;
      color: #6b7280;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .filter-btn.active-blue { border-color: #1a56db; background: #1a56db; color: white; }
    .filter-btn.active-red  { border-color: #dc2626; background: #dc2626; color: white; }
    .filter-btn.active-purple { border-color: #7c3aed; background: #7c3aed; color: white; }

    /* Items historique */
    .history-item {
      border-left: 4px solid #1a56db;
      background: #f8fafc;
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .history-item-achat {
      border-left: 4px solid #7c3aed;
      background: #f5f3ff;
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .history-meta { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 8px; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: white; }
    .badge-blue   { background: #1a56db; }
    .badge-teal   { background: #0891b2; }
    .badge-purple { background: #7c3aed; }
    .badge-green  { background: #16a34a; }
    .badge-gray   { background: #6b7280; }
    .del-btn { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; white-space: nowrap; }
    .produit-tag { display: inline-block; background: #e0f2fe; color: #0369a1; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; margin: 3px 4px 3px 0; font-weight: 600; }
    .produit-tag-achat { display: inline-block; background: #ede9fe; color: #6d28d9; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; margin: 3px 4px 3px 0; font-weight: 600; }
    .empty-state { text-align: center; color: #9ca3af; padding: 20px; font-size: 0.95rem; }

    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      color: white; padding: 14px 28px; border-radius: 12px;
      font-weight: 700; font-size: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s ease; z-index: 999;
      background: #16a34a;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .row { flex-direction: column; gap: 0; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast">✅ Enregistré !</div>

<header>
  <div class="icon">🏗️</div>
  <div>
    <h1>Suivi des produits</h1>
    <p>Enregistrez vos utilisations et achats de produits</p>
  </div>
</header>

<!-- UTILISATION -->
<div class="card">
  <h2>📝 Nouvelle utilisation</h2>
  <div class="row">
    <div>
      <label>📅 Date</label>
      <input type="date" id="u-date" />
    </div>
    <div>
      <label>🏗️ Chantier</label>
      <input type="text" id="u-chantier" placeholder="Ex : Maison Dupont" />
    </div>
  </div>
  <label>👷 Votre nom</label>
  <input type="text" id="u-ouvrier" placeholder="Ex : Jean Martin" />
  <label>📦 Produits utilisés</label>
  <div id="u-container"></div>
  <button class="add-btn" onclick="ajouterLigne('u')">➕ Ajouter un produit</button><br/>
  <button class="submit-btn" onclick="enregistrerUtilisation()">✅ Enregistrer l'utilisation</button>
</div>

<!-- ACHAT -->
<div class="card">
  <h2>🛒 Nouveau achat</h2>
  <div class="row">
    <div>
      <label>📅 Date</label>
      <input type="date" id="a-date" />
    </div>
    <div>
      <label>👤 Responsable</label>
      <input type="text" id="a-responsable" placeholder="Ex : Jean Martin" />
    </div>
  </div>
  <label>📦 Produits achetés</label>
  <div id="a-container"></div>
  <button class="add-btn-achat" onclick="ajouterLigne('a')">➕ Ajouter un produit</button><br/>
  <button class="submit-btn-achat" onclick="enregistrerAchat()">✅ Enregistrer l'achat</button>
</div>

<!-- HISTORIQUE -->
<div class="card">
  <h2>📋 Historique complet</h2>
  <div class="filter-btns">
    <button class="filter-btn active-blue" id="f-tous" onclick="setFiltre('tous')">Tout</button>
    <button class="filter-btn" id="f-utilisation" onclick="setFiltre('utilisation')">📦 Utilisations</button>
    <button class="filter-btn" id="f-achat" onclick="setFiltre('achat')">🛒 Achats</button>
  </div>
  <div id="historique"></div>
  <button class="export-btn" onclick="exporterXLSX()">📥 Exporter variation des stocks (.xlsx)</button>
</div>

<script>
// ─── DONNÉES INITIALES ────────────────────────────────────────────────────────
var STOCK_INITIAL = [
  {nom:"AMPHIKLIN SOLAR PROTECT", qte:8},
  {nom:"ANTIGRAFITY 2010 2L", qte:14},
  {nom:"ANTIGRAFITY 2030 5L", qte:6},
  {nom:"ANTISTAKLIN (10 L)", qte:19},
  {nom:"Asept 90", qte:23},
  {nom:"Bidons vides blancs (25L)", qte:53},
  {nom:"Bidons vides bleus (10L)", qte:140},
  {nom:"Bidons vides bleus (20L)", qte:139},
  {nom:"Bidons vides bleus (25L)", qte:62},
  {nom:"DECAP PEINTURE GUARD (5L)", qte:16},
  {nom:"DECAPSOLGUARD (25L)", qte:4.5},
  {nom:"DECAPSOLGUARD (IG Pro 20 L)", qte:2},
  {nom:"DEGRA CLEAN", qte:3},
  {nom:"DEGRAISSANT HB", qte:13},
  {nom:"Decap Cire Guard (5kg)", qte:2},
  {nom:"ECHANTILLON ENZYKLIN+ 5L", qte:23},
  {nom:"ENZYKLIN+ (10 L)", qte:41},
  {nom:"ENZYKLIN+ (20 L)", qte:30},
  {nom:"ENZYKLIN+ (25L)", qte:34},
  {nom:"ENZYKLIN+IBC VRAC", qte:2},
  {nom:"Enzyklin IBC (1000L)", qte:1},
  {nom:"GRAFIKLIN (5L)", qte:7},
  {nom:"GUARD REMOVER", qte:1},
  {nom:"HP Green", qte:14},
  {nom:"HYPO 30L", qte:6},
  {nom:"ImperGuard Pro (20 L)", qte:11},
  {nom:"KEC", qte:15},
  {nom:"KUVYKLIN ECO 10 KG", qte:27},
  {nom:"PROTECTGUARD MG PRO", qte:24},
  {nom:"PROTECTKLIN 3+", qte:9},
  {nom:"PROTECTKLIN 4+ (20 L)", qte:21},
  {nom:"PROTECTKLIN2+ (20L)", qte:9},
  {nom:"ProtectGuard Pro (PG Pro 25 L)", qte:4},
  {nom:"Protectguard EM 5kg", qte:1},
  {nom:"WASHGUARD EXPRESS (20L)", qte:6}
];

// PRODUITS = stock en cours (modifié par utilisations/achats)
var PRODUITS = JSON.parse(JSON.stringify(STOCK_INITIAL));

// Charger stocks ajustés depuis localStorage
var stocksSauv = {};
try { stocksSauv = JSON.parse(localStorage.getItem('stocks_ajustes') || '{}'); } catch(e) {}
for (var i = 0; i < PRODUITS.length; i++) {
  if (stocksSauv[PRODUITS[i].nom] !== undefined) {
    PRODUITS[i].qte = stocksSauv[PRODUITS[i].nom];
  }
}

var utilisations = [];
try { utilisations = JSON.parse(localStorage.getItem('stock_utilisations') || '[]'); } catch(e) {}

var achats = [];
try { achats = JSON.parse(localStorage.getItem('stock_achats') || '[]'); } catch(e) {}

var filtre = 'tous';
var cptU = 0;
var cptA = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('u-date').valueAsDate = new Date();
document.getElementById('a-date').valueAsDate = new Date();
ajouterLigne('u');
ajouterLigne('a');
afficherHistorique();

// ─── CONSTRUCTION DES OPTIONS ─────────────────────────────────────────────────
function buildOptions() {
  var html = '<option value="">-- Choisir un produit --</option>';
  for (var i = 0; i < PRODUITS.length; i++) {
    html += '<option value="' + i + '">' + PRODUITS[i].nom + ' — stock : ' + PRODUITS[i].qte + ' unité(s)</option>';
  }
  html += '<option value="AUTRE">Autre produit...</option>';
  return html;
}

// ─── AJOUTER UNE LIGNE PRODUIT ────────────────────────────────────────────────
function ajouterLigne(type) {
  var id, container, blocClass, labelQte, onInput;
  if (type === 'u') {
    cptU++;
    id = 'u' + cptU;
    container = 'u-container';
    blocClass = 'produit-bloc';
    labelQte = 'Quantité utilisée';
    onInput = 'majStockInfo("' + id + '")';
  } else {
    cptA++;
    id = 'a' + cptA;
    container = 'a-container';
    blocClass = 'produit-bloc-achat';
    labelQte = 'Quantité achetée';
    onInput = '';
  }

  var div = document.createElement('div');
  div.className = blocClass;
  div.id = 'bloc-' + id;

  var html = '<button class="remove-btn" onclick="document.getElementById(\'bloc-' + id + '\').remove()">✕</button>';
  html += '<label>Produit</label>';
  html += '<select id="sel-' + id + '" onchange="onChangeProduit(\'' + id + '\')">' + buildOptions() + '</select>';
  html += '<input type="text" id="autre-' + id + '" placeholder="Nom du produit..." style="display:none;margin-top:-10px;margin-bottom:16px;" />';
  if (type === 'u') {
    html += '<div class="stock-info" id="info-' + id + '"></div>';
  }
  html += '<label>' + labelQte + '</label>';
  html += '<input type="number" id="qte-' + id + '" min="0.1" step="0.1" value="1"' + (onInput ? ' oninput="' + onInput + '"' : '') + ' />';

  div.innerHTML = html;
  document.getElementById(container).appendChild(div);
}

function onChangeProduit(id) {
  var val = document.getElementById('sel-' + id).value;
  var autreEl = document.getElementById('autre-' + id);
  if (autreEl) autreEl.style.display = (val === 'AUTRE') ? 'block' : 'none';
  majStockInfo(id);
}

function majStockInfo(id) {
  var infoEl = document.getElementById('info-' + id);
  if (!infoEl) return;
  var val = document.getElementById('sel-' + id).value;
  if (val === '' || val === 'AUTRE') { infoEl.innerHTML = ''; return; }
  var p = PRODUITS[parseInt(val)];
  if (!p) { infoEl.innerHTML = ''; return; }
  var qte = parseFloat(document.getElementById('qte-' + id).value) || 0;
  var restant = Math.round((p.qte - qte) * 100) / 100;
  var couleur = restant < 0 ? '#dc2626' : restant === 0 ? '#d97706' : '#0369a1';
  var icone = restant < 0 ? '🔴' : restant === 0 ? '🟡' : '🟢';
  infoEl.innerHTML =
    '<span style="color:#6b7280">Stock actuel : <b>' + p.qte + '</b> unité(s)</span>' +
    '&nbsp;→&nbsp;<span style="color:' + couleur + ';font-weight:700">' + icone + ' Après : ' + restant + ' unité(s)</span>';
}

// ─── LIRE LES LIGNES PRODUIT D'UN FORMULAIRE ──────────────────────────────────
function lireProduits(containerSelector) {
  var blocs = document.querySelectorAll(containerSelector);
  var produits = [];
  for (var i = 0; i < blocs.length; i++) {
    var id = blocs[i].id.replace('bloc-', '');
    var val = document.getElementById('sel-' + id).value;
    var nom;
    if (val === 'AUTRE') {
      nom = document.getElementById('autre-' + id).value.trim();
    } else if (val !== '') {
      nom = PRODUITS[parseInt(val)].nom;
    } else {
      nom = '';
    }
    var qte = parseFloat(document.getElementById('qte-' + id).value);
    if (!nom) { alert('Veuillez choisir un produit pour chaque ligne.'); return null; }
    if (!qte || qte <= 0) { alert('Veuillez entrer une quantité valide.'); return null; }
    produits.push({nom: nom, qte: qte});
  }
  return produits;
}

// ─── SAUVEGARDER LES STOCKS ───────────────────────────────────────────────────
function sauvegarderStocks() {
  var snap = {};
  for (var i = 0; i < PRODUITS.length; i++) snap[PRODUITS[i].nom] = PRODUITS[i].qte;
  localStorage.setItem('stocks_ajustes', JSON.stringify(snap));
}

function modifierStock(produits, signe) {
  for (var s = 0; s < produits.length; s++) {
    for (var p = 0; p < PRODUITS.length; p++) {
      if (PRODUITS[p].nom === produits[s].nom) {
        PRODUITS[p].qte = Math.round((PRODUITS[p].qte + signe * produits[s].qte) * 100) / 100;
        break;
      }
    }
  }
  sauvegarderStocks();
}

// ─── ENREGISTRER UTILISATION ──────────────────────────────────────────────────
function enregistrerUtilisation() {
  var date = document.getElementById('u-date').value;
  var chantier = document.getElementById('u-chantier').value.trim();
  var ouvrier = document.getElementById('u-ouvrier').value.trim();
  if (!date || !chantier || !ouvrier) { alert('Veuillez remplir la date, le chantier et votre nom.'); return; }
  var blocs = document.getElementById('u-container').querySelectorAll('.produit-bloc');
  if (blocs.length === 0) { alert('Ajoutez au moins un produit.'); return; }
  var produits = lireProduits('#u-container .produit-bloc');
  if (!produits) return;

  utilisations.unshift({id: Date.now(), date: date, chantier: chantier, ouvrier: ouvrier, produits: produits, timestamp: new Date().toLocaleString('fr-BE')});
  localStorage.setItem('stock_utilisations', JSON.stringify(utilisations));
  modifierStock(produits, -1);

  document.getElementById('u-container').innerHTML = '';
  document.getElementById('u-chantier').value = '';
  document.getElementById('u-ouvrier').value = '';
  document.getElementById('u-date').valueAsDate = new Date();
  cptU = 0;
  ajouterLigne('u');
  afficherHistorique();
  showToast('✅ Utilisation enregistrée !', '#16a34a');
}

// ─── ENREGISTRER ACHAT ────────────────────────────────────────────────────────
function enregistrerAchat() {
  var date = document.getElementById('a-date').value;
  var responsable = document.getElementById('a-responsable').value.trim();
  if (!date || !responsable) { alert('Veuillez remplir la date et le responsable.'); return; }
  var blocs = document.getElementById('a-container').querySelectorAll('.produit-bloc-achat');
  if (blocs.length === 0) { alert('Ajoutez au moins un produit.'); return; }
  var produits = lireProduits('#a-container .produit-bloc-achat');
  if (!produits) return;

  achats.unshift({id: Date.now(), date: date, responsable: responsable, produits: produits, timestamp: new Date().toLocaleString('fr-BE')});
  localStorage.setItem('stock_achats', JSON.stringify(achats));
  modifierStock(produits, +1);

  document.getElementById('a-container').innerHTML = '';
  document.getElementById('a-responsable').value = '';
  document.getElementById('a-date').valueAsDate = new Date();
  cptA = 0;
  ajouterLigne('a');
  afficherHistorique();
  showToast('🛒 Achat enregistré !', '#7c3aed');
}

// ─── SUPPRIMER ────────────────────────────────────────────────────────────────
function supprimerUtilisation(id) {
  if (!confirm('Supprimer cette utilisation ? Le stock sera restauré.')) return;
  var entry = null;
  for (var i = 0; i < utilisations.length; i++) { if (utilisations[i].id === id) { entry = utilisations[i]; break; } }
  if (entry) modifierStock(entry.produits, +1);
  utilisations = utilisations.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_utilisations', JSON.stringify(utilisations));
  afficherHistorique();
}

function supprimerAchat(id) {
  if (!confirm('Supprimer cet achat ? Le stock sera recalculé.')) return;
  var entry = null;
  for (var i = 0; i < achats.length; i++) { if (achats[i].id === id) { entry = achats[i]; break; } }
  if (entry) modifierStock(entry.produits, -1);
  achats = achats.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_achats', JSON.stringify(achats));
  afficherHistorique();
}

// ─── FILTRE ───────────────────────────────────────────────────────────────────
function setFiltre(f) {
  filtre = f;
  var map = {tous: 'active-blue', utilisation: 'active-red', achat: 'active-purple'};
  var ids = ['tous', 'utilisation', 'achat'];
  for (var i = 0; i < ids.length; i++) {
    var btn = document.getElementById('f-' + ids[i]);
    btn.className = 'filter-btn' + (ids[i] === f ? ' ' + map[ids[i]] : '');
  }
  afficherHistorique();
}

// ─── AFFICHER HISTORIQUE ──────────────────────────────────────────────────────
function afficherHistorique() {
  var container = document.getElementById('historique');
  var items = [];
  for (var i = 0; i < utilisations.length; i++) items.push({type:'utilisation', data: utilisations[i]});
  for (var i = 0; i < achats.length; i++) items.push({type:'achat', data: achats[i]});
  items.sort(function(a, b) { return b.data.id - a.data.id; });
  if (filtre !== 'tous') items = items.filter(function(x) { return x.type === filtre; });

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state">Aucune entrée pour le moment.</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var e = item.data;
    var isAchat = item.type === 'achat';
    var tags = '';
    for (var j = 0; j < e.produits.length; j++) {
      if (isAchat) {
        tags += '<span class="produit-tag-achat">🛒 ' + e.produits[j].nom + ' +' + e.produits[j].qte + '</span>';
      } else {
        tags += '<span class="produit-tag">📦 ' + e.produits[j].nom + ' −' + e.produits[j].qte + '</span>';
      }
    }
    var delFn = isAchat ? 'supprimerAchat(' + e.id + ')' : 'supprimerUtilisation(' + e.id + ')';
    var typeBadge = isAchat
      ? '<span class="badge badge-purple">🛒 Achat</span>'
      : '<span class="badge badge-blue">🏗️ ' + e.chantier + '</span>';
    var whoBadge = isAchat
      ? '<span class="badge badge-gray">👤 ' + e.responsable + '</span>'
      : '<span class="badge badge-gray">👷 ' + e.ouvrier + '</span>';

    html +=
      '<div class="' + (isAchat ? 'history-item-achat' : 'history-item') + '">' +
        '<div class="history-meta">' +
          '<div class="badges">' +
            '<span class="badge badge-teal">📅 ' + formatDate(e.date) + '</span>' +
            typeBadge + whoBadge +
          '</div>' +
          '<button class="del-btn" onclick="' + delFn + '">🗑️</button>' +
        '</div>' +
        '<div>' + tags + '</div>' +
      '</div>';
  }
  container.innerHTML = html;
}

// ─── EXPORT XLSX ──────────────────────────────────────────────────────────────
function exporterXLSX() {
  if (utilisations.length === 0 && achats.length === 0) {
    alert('Aucune donnée à exporter.');
    return;
  }
  var wb = XLSX.utils.book_new();

  // Feuille 1 : Historique complet
  var hist = [['Date','Type','Chantier / Responsable','Produit','Quantité','Enregistré le']];
  var items = [];
  for (var i = 0; i < utilisations.length; i++) {
    var e = utilisations[i];
    for (var j = 0; j < e.produits.length; j++) {
      items.push([formatDate(e.date), 'Utilisation', e.chantier + ' / ' + e.ouvrier, e.produits[j].nom, -e.produits[j].qte, e.timestamp]);
    }
  }
  for (var i = 0; i < achats.length; i++) {
    var a = achats[i];
    for (var j = 0; j < a.produits.length; j++) {
      items.push([formatDate(a.date), 'Achat', a.responsable, a.produits[j].nom, +a.produits[j].qte, a.timestamp]);
    }
  }
  items.sort(function(a, b) { return a[5] < b[5] ? -1 : 1; });
  for (var i = 0; i < items.length; i++) hist.push(items[i]);
  var ws1 = XLSX.utils.aoa_to_sheet(hist);
  ws1['!cols'] = [{wch:12},{wch:13},{wch:28},{wch:35},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Historique complet');

  // Feuille 2 : Variation des stocks
  var totalUtilise = {}, totalAchete = {};
  for (var i = 0; i < utilisations.length; i++) {
    for (var j = 0; j < utilisations[i].produits.length; j++) {
      var n = utilisations[i].produits[j].nom;
      totalUtilise[n] = (totalUtilise[n] || 0) + utilisations[i].produits[j].qte;
    }
  }
  for (var i = 0; i < achats.length; i++) {
    for (var j = 0; j < achats[i].produits.length; j++) {
      var n = achats[i].produits[j].nom;
      totalAchete[n] = (totalAchete[n] || 0) + achats[i].produits[j].qte;
    }
  }

  var stock = [['Produit','Stock initial','Qté achetée','Qté utilisée','Stock final']];
  for (var k = 0; k < STOCK_INITIAL.length; k++) {
    var nom = STOCK_INITIAL[k].nom;
    var si   = STOCK_INITIAL[k].qte;
    var ach  = totalAchete[nom]  || 0;
    var util = totalUtilise[nom] || 0;
    var fin  = Math.round((si + ach - util) * 100) / 100;
    stock.push([nom, si, ach, util, fin]);
  }
  // Produits "Autre" hors liste
  var tousNoms = {};
  for (var n in totalUtilise) tousNoms[n] = true;
  for (var n in totalAchete)  tousNoms[n] = true;
  for (var n in tousNoms) {
    var found = false;
    for (var k = 0; k < STOCK_INITIAL.length; k++) { if (STOCK_INITIAL[k].nom === n) { found = true; break; } }
    if (!found) stock.push([n, 0, totalAchete[n]||0, totalUtilise[n]||0, (totalAchete[n]||0)-(totalUtilise[n]||0)]);
  }

  var ws2 = XLSX.utils.aoa_to_sheet(stock);
  ws2['!cols'] = [{wch:35},{wch:14},{wch:14},{wch:14},{wch:14}];
  for (var r = 1; r < stock.length; r++) {
    var cell = ws2[XLSX.utils.encode_cell({r:r, c:4})];
    if (cell && typeof cell.v === 'number') {
      if (cell.v < 0)      cell.s = {font:{bold:true,color:{rgb:'DC2626'}}, fill:{fgColor:{rgb:'FFEEEE'}}};
      else if (cell.v ===0) cell.s = {font:{bold:true,color:{rgb:'D97706'}}, fill:{fgColor:{rgb:'FFFBEB'}}};
      else                  cell.s = {font:{bold:true,color:{rgb:'16A34A'}}, fill:{fgColor:{rgb:'ECFDF5'}}};
    }
  }
  XLSX.utils.book_append_sheet(wb, ws2, 'Variation des stocks');

  XLSX.writeFile(wb, 'stock_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

// ─── UTILITAIRES ──────────────────────────────────────────────────────────────
function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function showToast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
