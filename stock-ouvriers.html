<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi Stock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

    #screen-login { width: 100%; max-width: 400px; margin-top: 40px; }
    .login-card { background: white; border-radius: 20px; padding: 32px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); text-align: center; }
    .login-logo { font-size: 3rem; margin-bottom: 8px; }
    .login-title { font-size: 1.4rem; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
    .login-sub { font-size: 0.9rem; color: #6b7280; margin-bottom: 24px; }
    .login-card label { display: block; text-align: left; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 0.95rem; }
    .login-card select, .login-card input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; color: #111827; background: #f9fafb; margin-bottom: 16px; }
    .login-card select:focus, .login-card input:focus { outline: none; border-color: #1a56db; background: white; }
    .pin-display { display: flex; justify-content: center; gap: 12px; margin: 8px 0 20px; }
    .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #1a56db; background: white; transition: background 0.15s; }
    .pin-dot.filled { background: #1a56db; }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .pin-key { padding: 16px; border-radius: 12px; border: 2px solid #e5e7eb; background: white; font-size: 1.3rem; font-weight: 700; color: #1e293b; cursor: pointer; transition: all 0.15s; }
    .pin-key:hover { background: #eff6ff; border-color: #1a56db; }
    .pin-key.del { color: #dc2626; border-color: #fecaca; background: #fff5f5; }
    .pin-key.del:hover { background: #fee2e2; }
    .pin-error { color: #dc2626; font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; min-height: 20px; }
    .btn-login { width: 100%; padding: 15px; background: #1a56db; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .btn-login:hover { background: #1648c0; }

    #screen-app { display: none; width: 100%; max-width: 700px; }
    header { background: #1a56db; color: white; width: 100%; border-radius: 16px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-icon { font-size: 2rem; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }
    .btn-logout { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); border-radius: 10px; padding: 8px 14px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-logout:hover { background: rgba(255,255,255,0.35); }
    .admin-badge { display: inline-block; background: #fbbf24; color: #92400e; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-weight: 700; margin-left: 6px; }

    .card { background: white; border-radius: 16px; padding: 24px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; color: #1e293b; margin-bottom: 18px; font-weight: 700; }
    label { display: block; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 0.95rem; }
    input, select { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; color: #111827; background: #f9fafb; transition: border-color 0.2s; margin-bottom: 16px; }
    input:focus, select:focus { outline: none; border-color: #1a56db; background: white; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }

    .produit-bloc { background: #f0f4ff; border: 2px dashed #a5b4fc; border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
    .produit-bloc-achat { background: #f5f3ff; border: 2px dashed #c4b5fd; border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
    .remove-btn { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 1rem; font-weight: 700; }

    .search-input { width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px 10px 0 0; font-size: 0.95rem; color: #111827; background: #f9fafb; margin-bottom: 0; border-bottom: 1px solid #e5e7eb; }
    .search-input:focus { outline: none; border-color: #1a56db; background: white; }
    .select-produit { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px; font-size: 1rem; color: #111827; background: #f9fafb; margin-bottom: 8px; }
    .select-produit:focus { outline: none; border-color: #1a56db; background: white; }

    .stock-info { font-size: 0.82rem; font-weight: 600; margin-bottom: 12px; min-height: 16px; }
    .add-btn { display: flex; align-items: center; gap: 8px; background: #eff6ff; color: #1a56db; border: 2px dashed #93c5fd; border-radius: 10px; padding: 12px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; margin-top: 4px; }
    .add-btn:hover { background: #dbeafe; }
    .add-btn-achat { display: flex; align-items: center; gap: 8px; background: #f5f3ff; color: #7c3aed; border: 2px dashed #c4b5fd; border-radius: 10px; padding: 12px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; margin-top: 4px; }
    .add-btn-achat:hover { background: #ede9fe; }
    .submit-btn { background: #16a34a; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
    .submit-btn:hover { background: #15803d; }
    .submit-btn-achat { background: #7c3aed; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
    .submit-btn-achat:hover { background: #6d28d9; }
    .export-btn { background: #f59e0b; color: white; border: none; border-radius: 10px; padding: 12px 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px; }
    .export-btn:hover { background: #d97706; }

    .filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #e5e7eb; background: white; color: #6b7280; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .filter-btn.active-blue { border-color: #1a56db; background: #1a56db; color: white; }
    .filter-btn.active-red  { border-color: #dc2626; background: #dc2626; color: white; }
    .filter-btn.active-purple { border-color: #7c3aed; background: #7c3aed; color: white; }

    .history-item { border-left: 4px solid #1a56db; background: #f8fafc; border-radius: 0 10px 10px 0; padding: 12px 16px; margin-bottom: 10px; }
    .history-item-achat { border-left: 4px solid #7c3aed; background: #f5f3ff; border-radius: 0 10px 10px 0; padding: 12px 16px; margin-bottom: 10px; }
    .history-meta { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 8px; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: white; }
    .badge-blue { background: #1a56db; } .badge-teal { background: #0891b2; } .badge-purple { background: #7c3aed; } .badge-gray { background: #6b7280; }
    .del-btn { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
    .produit-tag { display: inline-block; background: #e0f2fe; color: #0369a1; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; margin: 3px 4px 3px 0; font-weight: 600; }
    .produit-tag-achat { display: inline-block; background: #ede9fe; color: #6d28d9; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; margin: 3px 4px 3px 0; font-weight: 600; }
    .empty-state { text-align: center; color: #9ca3af; padding: 20px; font-size: 0.95rem; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); color: white; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.4s ease; z-index: 999; background: #16a34a; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    @media (max-width: 500px) { .row { flex-direction: column; gap: 0; } header h1 { font-size: 1.1rem; } }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">🏗️</div>
    <div class="login-title">Suivi des stocks</div>
    <div class="login-sub">Connectez-vous avec votre code PIN</div>
    <label>👷 Qui êtes-vous ?</label>
    <select id="login-nom">
      <option value="">-- Sélectionner votre nom --</option>
      <option value="Anthony">Anthony</option>
      <option value="Mathieu">Mathieu</option>
      <option value="Jérôme">Jérôme</option>
      <option value="FX">FX</option>
      <option value="Jean Louis">Jean Louis</option>
      <option value="Frère de Jean Louis">Frère de Jean Louis</option>
      <option value="Nouveau">Nouveau</option>
      <option value="ADMIN">👑 Administrateur</option>
    </select>
    <label>🔐 Code PIN</label>
    <div class="pin-display">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key del" onclick="pinClear()" style="font-size:0.8rem">Effacer</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="btn-login" onclick="seConnecter()">🔓 Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <header style="width:100%">
    <div class="header-left">
      <div class="header-icon">🏗️</div>
      <div>
        <h1>Suivi des stocks <span id="header-admin-badge"></span></h1>
        <p id="header-user">Bonjour !</p>
      </div>
    </div>
    <button class="btn-logout" onclick="seDeconnecter()">🚪 Déconnexion</button>
  </header>

  <div class="card">
    <h2>📝 Nouvelle utilisation</h2>
    <div class="row">
      <div>
        <label>📅 Date</label>
        <input type="date" id="u-date" />
      </div>
      <div>
        <label>🏗️ N° devis ou nom du chantier</label>
        <input type="text" id="u-chantier" placeholder="Ex : DEV-042 ou Maison Dupont" />
      </div>
    </div>
    <label>📦 Produits utilisés</label>
    <div id="u-container"></div>
    <button class="add-btn" onclick="ajouterLigne('u')">➕ Ajouter un produit</button><br/>
    <button class="submit-btn" onclick="enregistrerUtilisation()">✅ Enregistrer l'utilisation</button>
  </div>

  <div class="card" id="card-achat" style="display:none">
    <h2>🛒 Nouveau achat</h2>
    <div class="row">
      <div>
        <label>📅 Date</label>
        <input type="date" id="a-date" />
      </div>
      <div>
        <label>👤 Responsable</label>
        <input type="text" id="a-responsable" placeholder="Ex : Jean Martin" />
      </div>
    </div>
    <label>📦 Produits achetés</label>
    <div id="a-container"></div>
    <button class="add-btn-achat" onclick="ajouterLigne('a')">➕ Ajouter un produit</button><br/>
    <button class="submit-btn-achat" onclick="enregistrerAchat()">✅ Enregistrer l'achat</button>
  </div>

  <div class="card">
    <h2>📋 Historique complet</h2>
    <div class="filter-btns">
      <button class="filter-btn active-blue" id="f-tous" onclick="setFiltre('tous')">Tout</button>
      <button class="filter-btn" id="f-utilisation" onclick="setFiltre('utilisation')">📦 Utilisations</button>
      <button class="filter-btn" id="f-achat" onclick="setFiltre('achat')">🛒 Achats</button>
    </div>
    <div id="historique"></div>
    <button class="export-btn" onclick="exporterXLSX()">📥 Exporter variation des stocks (.xlsx)</button>
  </div>
</div>

<script>
var USERS = {
  'Anthony':             '3847',
  'Mathieu':             '6219',
  'Jérôme':              '5073',
  'FX':                  '9164',
  'Jean Louis':          '4528',
  'Frère de Jean Louis': '7391',
  'Nouveau':             '2856',
  'ADMIN':               '0000'
};

var STOCK_INITIAL = [
  {nom:"AMPHIKLIN SOLAR PROTECT",qte:8},{nom:"ANTIGRAFITY 2010 2L",qte:14},
  {nom:"ANTIGRAFITY 2030 5L",qte:6},{nom:"ANTISTAKLIN (10 L)",qte:19},
  {nom:"Asept 90",qte:23},{nom:"Bidons vides blancs (25L)",qte:53},
  {nom:"Bidons vides bleus (10L)",qte:140},{nom:"Bidons vides bleus (20L)",qte:139},
  {nom:"Bidons vides bleus (25L)",qte:62},{nom:"DECAP PEINTURE GUARD (5L)",qte:16},
  {nom:"DECAPSOLGUARD (25L)",qte:4.5},{nom:"DECAPSOLGUARD (IG Pro 20 L)",qte:2},
  {nom:"DEGRA CLEAN",qte:3},{nom:"DEGRAISSANT HB",qte:13},
  {nom:"Decap Cire Guard (5kg)",qte:2},{nom:"ECHANTILLON ENZYKLIN+ 5L",qte:23},
  {nom:"ENZYKLIN+ (10 L)",qte:41},{nom:"ENZYKLIN+ (20 L)",qte:30},
  {nom:"ENZYKLIN+ (25L)",qte:34},{nom:"ENZYKLIN+IBC VRAC",qte:2},
  {nom:"Enzyklin IBC (1000L)",qte:1},{nom:"GRAFIKLIN (5L)",qte:7},
  {nom:"GUARD REMOVER",qte:1},{nom:"HP Green",qte:14},{nom:"HYPO 30L",qte:6},
  {nom:"ImperGuard Pro (20 L)",qte:11},{nom:"KEC",qte:15},
  {nom:"KUVYKLIN ECO 10 KG",qte:27},{nom:"PROTECTGUARD MG PRO",qte:24},
  {nom:"PROTECTKLIN 3+",qte:9},{nom:"PROTECTKLIN 4+ (20 L)",qte:21},
  {nom:"PROTECTKLIN2+ (20L)",qte:9},{nom:"ProtectGuard Pro (PG Pro 25 L)",qte:4},
  {nom:"Protectguard EM 5kg",qte:1},{nom:"WASHGUARD EXPRESS (20L)",qte:6}
];

var PRODUITS = JSON.parse(JSON.stringify(STOCK_INITIAL));
try {
  var s = JSON.parse(localStorage.getItem('stocks_ajustes') || '{}');
  for (var i = 0; i < PRODUITS.length; i++) {
    if (s[PRODUITS[i].nom] !== undefined) PRODUITS[i].qte = s[PRODUITS[i].nom];
  }
} catch(e) {}

var utilisations = [];
try { utilisations = JSON.parse(localStorage.getItem('stock_utilisations') || '[]'); } catch(e) {}
var achats = [];
try { achats = JSON.parse(localStorage.getItem('stock_achats') || '[]'); } catch(e) {}

var currentUser = null;
var isAdmin = false;
var filtre = 'tous';
var cptU = 0, cptA = 0;
var pinBuffer = '';

// ── PIN ──
function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  majDots();
  if (pinBuffer.length === 4) setTimeout(seConnecter, 200);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); majDots(); }
function pinClear() { pinBuffer = ''; majDots(); document.getElementById('pin-error').textContent = ''; }
function majDots() {
  for (var i = 0; i < 4; i++)
    document.getElementById('dot-'+i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
}

// ── CONNEXION ──
function seConnecter() {
  var nom = document.getElementById('login-nom').value;
  var errEl = document.getElementById('pin-error');
  if (!nom) { errEl.textContent = '⚠️ Veuillez sélectionner votre nom.'; pinClear(); return; }
  if (pinBuffer.length < 4) { errEl.textContent = '⚠️ Entrez votre code PIN à 4 chiffres.'; return; }
  if (USERS[nom] !== pinBuffer) {
    errEl.textContent = '❌ Code PIN incorrect. Réessayez.';
    pinClear();
    var card = document.querySelector('.login-card');
    var seq = ['-6px','6px','-4px','4px','0px'], si = 0;
    var sh = setInterval(function() { card.style.transform = 'translateX('+seq[si++]+')'; if (si >= seq.length) clearInterval(sh); }, 60);
    return;
  }
  currentUser = nom;
  isAdmin = (nom === 'ADMIN');
  pinClear();
  errEl.textContent = '';
  document.getElementById('login-nom').value = '';
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('header-user').textContent = 'Connecté : ' + nom;
  document.getElementById('header-admin-badge').innerHTML = isAdmin ? '<span class="admin-badge">👑 Admin</span>' : '';
  document.getElementById('card-achat').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('a-responsable').value = isAdmin ? '' : nom;
  document.getElementById('u-date').valueAsDate = new Date();
  document.getElementById('a-date').valueAsDate = new Date();
  document.getElementById('u-container').innerHTML = '';
  document.getElementById('a-container').innerHTML = '';
  cptU = 0; cptA = 0;
  ajouterLigne('u');
  ajouterLigne('a');
  afficherHistorique();
}
function seDeconnecter() {
  currentUser = null; isAdmin = false;
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('screen-login').style.display = 'block';
}

// ── LIGNES PRODUITS ──
function buildOptions() {
  var h = '<option value="">-- Choisir un produit --</option>';
  for (var i = 0; i < PRODUITS.length; i++)
    h += '<option value="' + i + '">' + PRODUITS[i].nom + ' — stock : ' + PRODUITS[i].qte + '</option>';
  h += '<option value="AUTRE">Autre produit...</option>';
  return h;
}

function ajouterLigne(type) {
  var isU = (type === 'u');
  var id, container, cls, labelQte;
  if (isU) { cptU++; id = 'u'+cptU; container = 'u-container'; cls = 'produit-bloc';       labelQte = 'Quantité utilisée'; }
  else      { cptA++; id = 'a'+cptA; container = 'a-container'; cls = 'produit-bloc-achat'; labelQte = 'Quantité achetée';  }

  var div = document.createElement('div');
  div.className = cls;
  div.id = 'bloc-' + id;
  div.innerHTML = genLigneHTML(id, labelQte, isU);
  document.getElementById(container).appendChild(div);
}

function genLigneHTML(id, labelQte, hasInfo) {
  var h = '';
  h += '<button class="remove-btn" onclick="rmBloc(\'' + id + '\')">✕</button>';
  h += '<label>Produit</label>';
  h += '<input class="search-input" id="srch-' + id + '" type="text" placeholder="🔍 Tapez pour filtrer... (ex: ENZ)" autocomplete="off" oninput="filtrer(\'' + id + '\')" />';
  h += '<select class="select-produit" id="sel-' + id + '" onchange="selChange(\'' + id + '\')">' + buildOptions() + '</select>';
  h += '<input type="text" id="autre-' + id + '" placeholder="Nom du produit..." style="display:none;margin-bottom:8px;width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;" />';
  if (hasInfo) h += '<div class="stock-info" id="info-' + id + '"></div>';
  h += '<label style="margin-top:4px">' + labelQte + '</label>';
  h += '<input type="number" id="qte-' + id + '" min="0.1" step="0.1" value="1" oninput="majInfo(\'' + id + '\')" />';
  return h;
}

function rmBloc(id) { var el = document.getElementById('bloc-'+id); if (el) el.parentNode.removeChild(el); }

function filtrer(id) {
  var q = document.getElementById('srch-'+id).value.toUpperCase();
  var sel = document.getElementById('sel-'+id);
  var visible = [];
  for (var i = 0; i < sel.options.length; i++) {
    var opt = sel.options[i];
    if (opt.value === '' || opt.value === 'AUTRE') { opt.style.display = ''; continue; }
    var show = !q || opt.text.toUpperCase().indexOf(q) !== -1;
    opt.style.display = show ? '' : 'none';
    if (show) visible.push(i);
  }
  if (visible.length === 1) {
    sel.selectedIndex = visible[0];
    selChange(id);
  } else {
    sel.selectedIndex = 0;
    var info = document.getElementById('info-'+id);
    if (info) info.innerHTML = '';
  }
}

function selChange(id) {
  var val = document.getElementById('sel-'+id).value;
  var autre = document.getElementById('autre-'+id);
  if (autre) autre.style.display = (val === 'AUTRE') ? 'block' : 'none';
  majInfo(id);
}

function majInfo(id) {
  var info = document.getElementById('info-'+id);
  if (!info) return;
  var val = document.getElementById('sel-'+id).value;
  if (!val || val === 'AUTRE') { info.innerHTML = ''; return; }
  var p = PRODUITS[parseInt(val)];
  if (!p) { info.innerHTML = ''; return; }
  var q = parseFloat(document.getElementById('qte-'+id).value) || 0;
  var r = Math.round((p.qte - q) * 100) / 100;
  var col = r < 0 ? '#dc2626' : r === 0 ? '#d97706' : '#0369a1';
  var ico = r < 0 ? '🔴' : r === 0 ? '🟡' : '🟢';
  info.innerHTML = '<span style="color:#6b7280">Stock actuel : <b>' + p.qte + '</b></span> &nbsp;→&nbsp; <span style="color:' + col + ';font-weight:700">' + ico + ' Après : ' + r + '</span>';
}

// ── LIRE PRODUITS FORMULAIRE ──
function lireProduits(blocs) {
  var arr = [];
  for (var i = 0; i < blocs.length; i++) {
    var id = blocs[i].id.replace('bloc-', '');
    var val = document.getElementById('sel-'+id).value;
    var nom = '';
    if (val === 'AUTRE') { nom = document.getElementById('autre-'+id).value.trim(); }
    else if (val !== '') { nom = PRODUITS[parseInt(val)].nom; }
    var qte = parseFloat(document.getElementById('qte-'+id).value);
    if (!nom) { alert('Veuillez choisir un produit pour chaque ligne.'); return null; }
    if (!qte || qte <= 0) { alert('Veuillez entrer une quantité valide.'); return null; }
    arr.push({nom:nom, qte:qte});
  }
  return arr;
}

// ── STOCKS ──
function sauvegarderStocks() {
  var snap = {};
  for (var i = 0; i < PRODUITS.length; i++) snap[PRODUITS[i].nom] = PRODUITS[i].qte;
  localStorage.setItem('stocks_ajustes', JSON.stringify(snap));
}
function modifierStock(produits, signe) {
  for (var s = 0; s < produits.length; s++)
    for (var p = 0; p < PRODUITS.length; p++)
      if (PRODUITS[p].nom === produits[s].nom) { PRODUITS[p].qte = Math.round((PRODUITS[p].qte + signe * produits[s].qte)*100)/100; break; }
  sauvegarderStocks();
}

// ── ENREGISTRER ──
function enregistrerUtilisation() {
  var date = document.getElementById('u-date').value;
  var chantier = document.getElementById('u-chantier').value.trim();
  if (!date || !chantier) { alert('Veuillez remplir la date et le chantier.'); return; }
  var blocs = document.getElementById('u-container').querySelectorAll('.produit-bloc');
  if (!blocs.length) { alert('Ajoutez au moins un produit.'); return; }
  var produits = lireProduits(blocs);
  if (!produits) return;
  utilisations.unshift({id:Date.now(), date:date, chantier:chantier, ouvrier:currentUser, produits:produits, timestamp:new Date().toLocaleString('fr-BE')});
  localStorage.setItem('stock_utilisations', JSON.stringify(utilisations));
  modifierStock(produits, -1);
  document.getElementById('u-container').innerHTML = '';
  document.getElementById('u-chantier').value = '';
  document.getElementById('u-date').valueAsDate = new Date();
  cptU = 0; ajouterLigne('u');
  afficherHistorique();
  showToast('✅ Utilisation enregistrée !', '#16a34a');
}

function enregistrerAchat() {
  var date = document.getElementById('a-date').value;
  var resp = document.getElementById('a-responsable').value.trim();
  if (!date || !resp) { alert('Veuillez remplir la date et le responsable.'); return; }
  var blocs = document.getElementById('a-container').querySelectorAll('.produit-bloc-achat');
  if (!blocs.length) { alert('Ajoutez au moins un produit.'); return; }
  var produits = lireProduits(blocs);
  if (!produits) return;
  achats.unshift({id:Date.now(), date:date, responsable:resp, produits:produits, timestamp:new Date().toLocaleString('fr-BE')});
  localStorage.setItem('stock_achats', JSON.stringify(achats));
  modifierStock(produits, +1);
  document.getElementById('a-container').innerHTML = '';
  document.getElementById('a-date').valueAsDate = new Date();
  cptA = 0; ajouterLigne('a');
  afficherHistorique();
  showToast('🛒 Achat enregistré !', '#7c3aed');
}

// ── SUPPRIMER ──
function supprimerUtilisation(id) {
  var entry = null;
  for (var i = 0; i < utilisations.length; i++) if (utilisations[i].id === id) { entry = utilisations[i]; break; }
  if (!entry) return;
  if (!isAdmin && entry.ouvrier !== currentUser) { alert('Vous ne pouvez supprimer que vos propres entrées.'); return; }
  if (!confirm('Supprimer cette utilisation ? Le stock sera restauré.')) return;
  modifierStock(entry.produits, +1);
  utilisations = utilisations.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_utilisations', JSON.stringify(utilisations));
  afficherHistorique();
}
function supprimerAchat(id) {
  if (!isAdmin) { alert("Seul l'administrateur peut supprimer des achats."); return; }
  var entry = null;
  for (var i = 0; i < achats.length; i++) if (achats[i].id === id) { entry = achats[i]; break; }
  if (!entry) return;
  if (!confirm('Supprimer cet achat ? Le stock sera recalculé.')) return;
  modifierStock(entry.produits, -1);
  achats = achats.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_achats', JSON.stringify(achats));
  afficherHistorique();
}

// ── HISTORIQUE ──
function setFiltre(f) {
  filtre = f;
  var map = {tous:'active-blue', utilisation:'active-red', achat:'active-purple'};
  ['tous','utilisation','achat'].forEach(function(k) {
    document.getElementById('f-'+k).className = 'filter-btn' + (k===f ? ' '+map[k] : '');
  });
  afficherHistorique();
}

function afficherHistorique() {
  var container = document.getElementById('historique');
  var items = [];
  for (var i = 0; i < utilisations.length; i++) items.push({type:'utilisation', data:utilisations[i]});
  for (var i = 0; i < achats.length; i++) items.push({type:'achat', data:achats[i]});
  items.sort(function(a,b) { return b.data.id - a.data.id; });
  if (filtre !== 'tous') items = items.filter(function(x) { return x.type === filtre; });
  if (!items.length) { container.innerHTML = '<div class="empty-state">Aucune entrée pour le moment.</div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i], e = it.data, isAchat = it.type === 'achat';
    var tags = '';
    for (var j = 0; j < e.produits.length; j++)
      tags += isAchat
        ? '<span class="produit-tag-achat">🛒 '+e.produits[j].nom+' +'+e.produits[j].qte+'</span>'
        : '<span class="produit-tag">📦 '+e.produits[j].nom+' −'+e.produits[j].qte+'</span>';
    var canDel = isAdmin || (!isAchat && e.ouvrier === currentUser);
    var delFn  = isAchat ? 'supprimerAchat('+e.id+')' : 'supprimerUtilisation('+e.id+')';
    var delBtn = canDel ? '<button class="del-btn" onclick="'+delFn+'">🗑️</button>' : '';
    var typeBadge = isAchat ? '<span class="badge badge-purple">🛒 Achat</span>' : '<span class="badge badge-blue">🏗️ '+e.chantier+'</span>';
    var whoBadge  = isAchat ? '<span class="badge badge-gray">👤 '+e.responsable+'</span>' : '<span class="badge badge-gray">👷 '+e.ouvrier+'</span>';
    html += '<div class="'+(isAchat?'history-item-achat':'history-item')+'">'
          + '<div class="history-meta"><div class="badges"><span class="badge badge-teal">📅 '+fmtDate(e.date)+'</span>'+typeBadge+whoBadge+'</div>'+delBtn+'</div>'
          + '<div>'+tags+'</div></div>';
  }
  container.innerHTML = html;
}

// ── EXPORT ──
function exporterXLSX() {
  if (!utilisations.length && !achats.length) { alert('Aucune donnée à exporter.'); return; }
  var wb = XLSX.utils.book_new();
  var hist = [['Date','Type','Chantier / Responsable','Ouvrier','Produit','Quantité','Enregistré le']];
  var rows = [];
  for (var i = 0; i < utilisations.length; i++) {
    var e = utilisations[i];
    for (var j = 0; j < e.produits.length; j++) rows.push([fmtDate(e.date),'Utilisation',e.chantier,e.ouvrier,e.produits[j].nom,-e.produits[j].qte,e.timestamp]);
  }
  for (var i = 0; i < achats.length; i++) {
    var a = achats[i];
    for (var j = 0; j < a.produits.length; j++) rows.push([fmtDate(a.date),'Achat','',a.responsable,a.produits[j].nom,+a.produits[j].qte,a.timestamp]);
  }
  rows.sort(function(a,b) { return a[6]<b[6]?-1:1; });
  for (var i = 0; i < rows.length; i++) hist.push(rows[i]);
  var ws1 = XLSX.utils.aoa_to_sheet(hist);
  ws1['!cols'] = [{wch:12},{wch:13},{wch:25},{wch:18},{wch:35},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Historique complet');

  var totalU = {}, totalA = {};
  for (var i = 0; i < utilisations.length; i++) for (var j = 0; j < utilisations[i].produits.length; j++) { var n=utilisations[i].produits[j].nom; totalU[n]=(totalU[n]||0)+utilisations[i].produits[j].qte; }
  for (var i = 0; i < achats.length; i++) for (var j = 0; j < achats[i].produits.length; j++) { var n=achats[i].produits[j].nom; totalA[n]=(totalA[n]||0)+achats[i].produits[j].qte; }
  var stock = [['Produit','Stock initial','Qté achetée','Qté utilisée','Stock final']];
  for (var k = 0; k < STOCK_INITIAL.length; k++) {
    var n=STOCK_INITIAL[k].nom, si=STOCK_INITIAL[k].qte, ach=totalA[n]||0, util=totalU[n]||0;
    stock.push([n,si,ach,util,Math.round((si+ach-util)*100)/100]);
  }
  var ws2 = XLSX.utils.aoa_to_sheet(stock);
  ws2['!cols'] = [{wch:35},{wch:14},{wch:14},{wch:14},{wch:14}];
  for (var r = 1; r < stock.length; r++) {
    var cell = ws2[XLSX.utils.encode_cell({r:r,c:4})];
    if (cell && typeof cell.v==='number') {
      if (cell.v<0)        cell.s={font:{bold:true,color:{rgb:'DC2626'}},fill:{fgColor:{rgb:'FFEEEE'}}};
      else if (cell.v===0) cell.s={font:{bold:true,color:{rgb:'D97706'}},fill:{fgColor:{rgb:'FFFBEB'}}};
      else                 cell.s={font:{bold:true,color:{rgb:'16A34A'}},fill:{fgColor:{rgb:'ECFDF5'}}};
    }
  }
  XLSX.utils.book_append_sheet(wb, ws2, 'Variation des stocks');
  XLSX.writeFile(wb, 'stock_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function fmtDate(d) { if (!d) return ''; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function showToast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
