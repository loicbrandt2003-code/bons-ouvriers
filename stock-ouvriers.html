<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi Stock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      background: #1a56db;
      color: white;
      width: 100%;
      max-width: 700px;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .icon { font-size: 2.2rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 2px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #1e293b;
      margin-bottom: 18px;
      font-weight: 700;
    }

    label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #1a56db;
      background: white;
    }

    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }

    .produit-bloc {
      background: #f0f4ff;
      border: 2px dashed #a5b4fc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
    }

    .stock-info {
      font-size: 0.82rem;
      color: #0369a1;
      font-weight: 600;
      margin-top: -12px;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eff6ff;
      color: #1a56db;
      border: 2px dashed #93c5fd;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .add-btn:hover { background: #dbeafe; }

    .submit-btn {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #15803d; }

    .submit-btn-achat {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn-achat:hover { background: #6d28d9; }

    .produit-bloc-achat {
      background: #f5f3ff;
      border: 2px dashed #c4b5fd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }

    .badge.achat { background: #7c3aed; }

    .history-item-achat {
      border-left: 4px solid #7c3aed;
      background: #f5f3ff;
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .produit-tag-achat {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.85rem;
      margin: 3px 4px 3px 0;
      font-weight: 600;
    }

    .export-btn {
      background: #f59e0b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .export-btn:hover { background: #d97706; }

    .history-item {
      border-left: 4px solid #1a56db;
      background: #f8fafc;
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .history-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge { background: #1a56db; color: white; border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
    .badge.chantier { background: #7c3aed; }
    .badge.date { background: #0891b2; }

    .produit-tag {
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.85rem;
      margin: 3px 4px 3px 0;
      font-weight: 600;
    }

    .empty-state { text-align: center; color: #9ca3af; padding: 20px; font-size: 0.95rem; }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #16a34a;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s ease;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .row { flex-direction: column; gap: 0; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast">✅ Enregistré avec succès !</div>

<header>
  <div class="icon">🏗️</div>
  <div>
    <h1>Suivi des produits utilisés</h1>
    <p>Notez simplement ce que vous avez utilisé sur le chantier</p>
  </div>
</header>

<div class="card">
  <h2>📝 Nouvelle utilisation</h2>

  <div class="row">
    <div>
      <label>📅 Date</label>
      <input type="date" id="date" />
    </div>
    <div>
      <label>🏗️ Chantier</label>
      <input type="text" id="chantier" placeholder="Ex : Maison Dupont" />
    </div>
  </div>

  <label>👷 Votre nom</label>
  <input type="text" id="ouvrier" placeholder="Ex : Jean Martin" />

  <label>📦 Produits utilisés</label>
  <div id="produits-container"></div>

  <button class="add-btn" onclick="ajouterProduit()">➕ Ajouter un produit</button>
  <br/>
  <button class="submit-btn" onclick="enregistrer()">✅ Enregistrer</button>
</div>

<div class="card">
  <h2>🛒 Produits achetés</h2>

  <div class="row">
    <div>
      <label>📅 Date</label>
      <input type="date" id="date-achat" />
    </div>
    <div>
      <label>👤 Responsable</label>
      <input type="text" id="responsable-achat" placeholder="Ex : Jean Martin" />
    </div>
  </div>

  <label>📦 Produits achetés</label>
  <div id="achats-container"></div>

  <button class="add-btn" onclick="ajouterAchat()">➕ Ajouter un produit</button>
  <br/>
  <button class="submit-btn-achat" onclick="enregistrerAchat()">✅ Enregistrer l'achat</button>
</div>

<div class="card">
  <h2>📋 Historique complet</h2>
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <button onclick="filtrerHistorique('tous')" id="btn-tous" style="flex:1;padding:10px;border-radius:8px;border:2px solid #1a56db;background:#1a56db;color:white;font-weight:700;cursor:pointer;font-size:0.9rem;">Tout</button>
    <button onclick="filtrerHistorique('utilisation')" id="btn-utilisation" style="flex:1;padding:10px;border-radius:8px;border:2px solid #1a56db;background:white;color:#1a56db;font-weight:700;cursor:pointer;font-size:0.9rem;">📦 Utilisations</button>
    <button onclick="filtrerHistorique('achat')" id="btn-achat" style="flex:1;padding:10px;border-radius:8px;border:2px solid #7c3aed;background:white;color:#7c3aed;font-weight:700;cursor:pointer;font-size:0.9rem;">🛒 Achats</button>
  </div>
  <div id="historique-unifie"></div>
  <button class="export-btn" onclick="exporterCSV()">📥 Exporter variation des stocks (.xlsx)</button>
</div>

<script>
var PRODUITS = [
  {nom:"AMPHIKLIN SOLAR PROTECT", qte:8},
  {nom:"ANTIGRAFITY 2010 2L", qte:14},
  {nom:"ANTIGRAFITY 2030 5L", qte:6},
  {nom:"ANTISTAKLIN (10 L)", qte:19},
  {nom:"Asept 90", qte:23},
  {nom:"Bidons vides blancs (25L)", qte:53},
  {nom:"Bidons vides bleus (10L)", qte:140},
  {nom:"Bidons vides bleus (20L)", qte:139},
  {nom:"Bidons vides bleus (25L)", qte:62},
  {nom:"DECAP PEINTURE GUARD (5L)", qte:16},
  {nom:"DECAPSOLGUARD (25L)", qte:4.5},
  {nom:"DECAPSOLGUARD (IG Pro 20 L)", qte:2},
  {nom:"DEGRA CLEAN", qte:3},
  {nom:"DEGRAISSANT HB", qte:13},
  {nom:"Decap Cire Guard (5kg)", qte:2},
  {nom:"ECHANTILLON ENZYKLIN+ 5L", qte:23},
  {nom:"ENZYKLIN+ (10 L)", qte:41},
  {nom:"ENZYKLIN+ (20 L)", qte:30},
  {nom:"ENZYKLIN+ (25L)", qte:34},
  {nom:"ENZYKLIN+IBC VRAC", qte:2},
  {nom:"Enzyklin IBC (1000L)", qte:1},
  {nom:"GRAFIKLIN (5L)", qte:7},
  {nom:"GUARD REMOVER", qte:1},
  {nom:"HP Green", qte:14},
  {nom:"HYPO 30L", qte:6},
  {nom:"ImperGuard Pro (20 L)", qte:11},
  {nom:"KEC", qte:15},
  {nom:"KUVYKLIN ECO 10 KG", qte:27},
  {nom:"PROTECTGUARD MG PRO", qte:24},
  {nom:"PROTECTKLIN 3+", qte:9},
  {nom:"PROTECTKLIN 4+ (20 L)", qte:21},
  {nom:"PROTECTKLIN2+ (20L)", qte:9},
  {nom:"ProtectGuard Pro (PG Pro 25 L)", qte:4},
  {nom:"Protectguard EM 5kg", qte:1},
  {nom:"WASHGUARD EXPRESS (20L)", qte:6}
];

var entrees = [];
try { entrees = JSON.parse(localStorage.getItem('stock_entrees') || '[]'); } catch(e) { entrees = []; }
var compteur = 0;

// Charger les stocks ajustés depuis localStorage (ou utiliser valeurs initiales)
var stocksAjustes = {};
try { stocksAjustes = JSON.parse(localStorage.getItem('stocks_ajustes') || '{}'); } catch(e) { stocksAjustes = {}; }
// Appliquer les stocks sauvegardés sur le tableau PRODUITS
for (var _i = 0; _i < PRODUITS.length; _i++) {
  if (stocksAjustes[PRODUITS[_i].nom] !== undefined) {
    PRODUITS[_i].qte = stocksAjustes[PRODUITS[_i].nom];
  }
}

document.getElementById('date').valueAsDate = new Date();

var achats = [];
try { achats = JSON.parse(localStorage.getItem('stock_achats') || '[]'); } catch(e) { achats = []; }
var compteurAchat = 0;

function buildOptions() {
  var html = '<option value="">-- Choisir un produit --</option>';
  for (var i = 0; i < PRODUITS.length; i++) {
    var p = PRODUITS[i];
    html += '<option value="' + i + '">' + p.nom + ' — stock : ' + p.qte + ' unité(s)</option>';
  }
  html += '<option value="AUTRE">Autre produit...</option>';
  return html;
}

function buildOptionsAchat() {
  var html = '<option value="">-- Choisir un produit --</option>';
  for (var i = 0; i < PRODUITS.length; i++) {
    var p = PRODUITS[i];
    html += '<option value="' + i + '">' + p.nom + ' — stock actuel : ' + p.qte + ' unité(s)</option>';
  }
  html += '<option value="AUTRE">Autre produit...</option>';
  return html;
}

function ajouterAchat() {
  compteurAchat++;
  var id = 'a' + compteurAchat;
  var div = document.createElement('div');
  div.className = 'produit-bloc-achat';
  div.id = 'bloc-' + id;

  var html = '<button class="remove-btn" onclick="supprimerBlocAchat('' + id + '')">✕</button>';
  html += '<label>Produit</label>';
  html += '<select id="sel-' + id + '">' + buildOptionsAchat() + '</select>';
  html += '<input type="text" id="autre-' + id + '" placeholder="Nom du produit..." style="display:none;margin-top:-8px" />';
  html += '<label>Quantité achetée</label>';
  html += '<input type="number" id="qte-' + id + '" min="0.1" step="0.1" value="1" />';

  div.innerHTML = html;
  document.getElementById('achats-container').appendChild(div);
}

function supprimerBlocAchat(id) {
  var el = document.getElementById('bloc-' + id);
  if (el) el.remove();
}

function enregistrerAchat() {
  var date = document.getElementById('date-achat').value;
  var responsable = document.getElementById('responsable-achat').value.trim();

  if (!date || !responsable) {
    alert('Veuillez remplir la date et le responsable.');
    return;
  }

  var blocs = document.getElementById('achats-container').querySelectorAll('.produit-bloc-achat');
  if (blocs.length === 0) { alert('Ajoutez au moins un produit.'); return; }

  var produits = [];
  for (var i = 0; i < blocs.length; i++) {
    var id = blocs[i].id.replace('bloc-', '');
    var val = document.getElementById('sel-' + id).value;
    var nom = val === 'AUTRE'
      ? document.getElementById('autre-' + id).value.trim()
      : (val !== '' ? PRODUITS[parseInt(val)].nom : '');
    var qte = parseFloat(document.getElementById('qte-' + id).value);

    if (!nom) { alert('Veuillez choisir un produit pour chaque ligne.'); return; }
    if (!qte || qte <= 0) { alert('Veuillez entrer une quantité valide.'); return; }
    produits.push({nom: nom, qte: qte});
  }

  // Augmenter le stock en mémoire
  for (var s = 0; s < produits.length; s++) {
    for (var p = 0; p < PRODUITS.length; p++) {
      if (PRODUITS[p].nom === produits[s].nom) {
        PRODUITS[p].qte = Math.round((PRODUITS[p].qte + produits[s].qte) * 100) / 100;
        break;
      }
    }
  }
  // Sauvegarder les stocks mis à jour
  var snap = {};
  for (var p = 0; p < PRODUITS.length; p++) { snap[PRODUITS[p].nom] = PRODUITS[p].qte; }
  localStorage.setItem('stocks_ajustes', JSON.stringify(snap));

  var achat = {
    id: Date.now(),
    date: date,
    responsable: responsable,
    produits: produits,
    timestamp: new Date().toLocaleString('fr-BE')
  };

  achats.unshift(achat);
  localStorage.setItem('stock_achats', JSON.stringify(achats));

  document.getElementById('achats-container').innerHTML = '';
  document.getElementById('responsable-achat').value = '';
  document.getElementById('date-achat').valueAsDate = new Date();
  compteurAchat = 0;

  afficherHistorique();
  showToastAchat();
}



function supprimerAchat(id) {
  if (!confirm('Supprimer cet achat ? Le stock sera recalculé.')) return;
  var achat = null;
  for (var i = 0; i < achats.length; i++) { if (achats[i].id === id) { achat = achats[i]; break; } }
  if (achat) {
    // Remettre le stock à l'état avant l'achat
    for (var s = 0; s < achat.produits.length; s++) {
      for (var p = 0; p < PRODUITS.length; p++) {
        if (PRODUITS[p].nom === achat.produits[s].nom) {
          PRODUITS[p].qte = Math.round((PRODUITS[p].qte - achat.produits[s].qte) * 100) / 100;
          break;
        }
      }
    }
    var snap = {};
    for (var p = 0; p < PRODUITS.length; p++) { snap[PRODUITS[p].nom] = PRODUITS[p].qte; }
    localStorage.setItem('stocks_ajustes', JSON.stringify(snap));
  }
  achats = achats.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_achats', JSON.stringify(achats));
  afficherHistorique();
}

function showToastAchat() {
  var t = document.getElementById('toast');
  t.style.background = '#7c3aed';
  t.textContent = '🛒 Achat enregistré !';
  t.classList.add('show');
  setTimeout(function() {
    t.classList.remove('show');
    setTimeout(function() { t.style.background = '#16a34a'; t.textContent = '✅ Enregistré avec succès !'; }, 400);
  }, 2500);
}

function ajouterProduit() {
  compteur++;
  var id = compteur;
  var div = document.createElement('div');
  div.className = 'produit-bloc';
  div.id = 'bloc-' + id;

  var html = '<button class="remove-btn" onclick="supprimerProduit(' + id + ')">✕</button>';
  html += '<label>Produit</label>';
  html += '<select id="sel-' + id + '" onchange="majInfo(' + id + ')">' + buildOptions() + '</select>';
  html += '<div class="stock-info" id="info-' + id + '"></div>';
  html += '<input type="text" id="autre-' + id + '" placeholder="Nom du produit..." style="display:none;margin-top:-10px" />';
  html += '<label>Quantité utilisée</label>';
  html += '<input type="number" id="qte-' + id + '" min="0.1" step="0.1" value="1" oninput="majStockRestant(' + id + ')" />';

  div.innerHTML = html;
  document.getElementById('produits-container').appendChild(div);
}

function majInfo(id) {
  var val = document.getElementById('sel-' + id).value;
  var infoEl = document.getElementById('info-' + id);
  var autreEl = document.getElementById('autre-' + id);
  if (val === 'AUTRE') {
    autreEl.style.display = 'block';
    infoEl.innerHTML = '';
  } else if (val !== '') {
    autreEl.style.display = 'none';
    var p = PRODUITS[parseInt(val)];
    if (p) {
      var qteInput = document.getElementById('qte-' + id);
      qteInput.setAttribute('data-stock', p.qte);
      qteInput.setAttribute('data-produit-idx', val);
      majStockRestant(id);
    }
  } else {
    autreEl.style.display = 'none';
    infoEl.innerHTML = '';
  }
}

function majStockRestant(id) {
  var infoEl = document.getElementById('info-' + id);
  var qteInput = document.getElementById('qte-' + id);
  var stockInit = parseFloat(qteInput.getAttribute('data-stock'));
  if (isNaN(stockInit)) { infoEl.innerHTML = ''; return; }
  var used = parseFloat(qteInput.value) || 0;
  var restant = stockInit - used;
  var couleur, icone;
  if (restant < 0) {
    couleur = '#dc2626'; icone = '🔴';
  } else if (restant === 0) {
    couleur = '#d97706'; icone = '🟡';
  } else {
    couleur = '#0369a1'; icone = '🟢';
  }
  infoEl.innerHTML =
    '<span style="color:#6b7280">Stock initial : <b>' + stockInit + '</b> unité(s)</span>' +
    '&nbsp;&nbsp;→&nbsp;&nbsp;' +
    '<span style="color:' + couleur + ';font-weight:700">' + icone + ' Stock restant : ' + restant + ' unité(s)</span>';
}

function supprimerProduit(id) {
  var el = document.getElementById('bloc-' + id);
  if (el) el.remove();
}

function enregistrer() {
  var date = document.getElementById('date').value;
  var chantier = document.getElementById('chantier').value.trim();
  var ouvrier = document.getElementById('ouvrier').value.trim();

  if (!date || !chantier || !ouvrier) {
    alert('Veuillez remplir la date, le chantier et votre nom.');
    return;
  }

  var blocs = document.querySelectorAll('.produit-bloc');
  if (blocs.length === 0) {
    alert('Ajoutez au moins un produit.');
    return;
  }

  var produits = [];
  for (var i = 0; i < blocs.length; i++) {
    var id = blocs[i].id.replace('bloc-', '');
    var val = document.getElementById('sel-' + id).value;
    var nom = val === 'AUTRE'
      ? document.getElementById('autre-' + id).value.trim()
      : (val !== '' ? PRODUITS[parseInt(val)].nom : '');
    var qte = parseFloat(document.getElementById('qte-' + id).value);

    if (!nom) { alert('Veuillez choisir un produit pour chaque ligne.'); return; }
    if (!qte || qte <= 0) { alert('Veuillez entrer une quantité valide.'); return; }
    produits.push({nom: nom, qte: qte});
  }

  var entree = {
    id: Date.now(),
    date: date,
    chantier: chantier,
    ouvrier: ouvrier,
    produits: produits,
    timestamp: new Date().toLocaleString('fr-BE')
  };

  entrees.unshift(entree);
  localStorage.setItem('stock_entrees', JSON.stringify(entrees));

  // Déduire les quantités utilisées du stock en mémoire
  for (var s = 0; s < produits.length; s++) {
    for (var p = 0; p < PRODUITS.length; p++) {
      if (PRODUITS[p].nom === produits[s].nom) {
        PRODUITS[p].qte = Math.round((PRODUITS[p].qte - produits[s].qte) * 100) / 100;
        break;
      }
    }
  }
  // Sauvegarder les stocks ajustés dans localStorage
  var snap = {};
  for (var p = 0; p < PRODUITS.length; p++) { snap[PRODUITS[p].nom] = PRODUITS[p].qte; }
  localStorage.setItem('stocks_ajustes', JSON.stringify(snap));

  document.getElementById('produits-container').innerHTML = '';
  document.getElementById('chantier').value = '';
  document.getElementById('ouvrier').value = '';
  document.getElementById('date').valueAsDate = new Date();

var achats = [];
try { achats = JSON.parse(localStorage.getItem('stock_achats') || '[]'); } catch(e) { achats = []; }
var compteurAchat = 0;
  compteur = 0;

  afficherHistorique();
  showToast();
}

function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function supprimerEntree(id) {
  if (!confirm('Supprimer cette entrée ?')) return;
  // Retrouver l'entrée pour remettre les stocks
  var entree = null;
  for (var i = 0; i < entrees.length; i++) { if (entrees[i].id === id) { entree = entrees[i]; break; } }
  if (entree) {
    for (var s = 0; s < entree.produits.length; s++) {
      for (var p = 0; p < PRODUITS.length; p++) {
        if (PRODUITS[p].nom === entree.produits[s].nom) {
          PRODUITS[p].qte = Math.round((PRODUITS[p].qte + entree.produits[s].qte) * 100) / 100;
          break;
        }
      }
    }
    var snap = {};
    for (var p = 0; p < PRODUITS.length; p++) { snap[PRODUITS[p].nom] = PRODUITS[p].qte; }
    localStorage.setItem('stocks_ajustes', JSON.stringify(snap));
  }
  entrees = entrees.filter(function(e) { return e.id !== id; });
  localStorage.setItem('stock_entrees', JSON.stringify(entrees));
  afficherHistorique();
}

var filtreActif = 'tous';

function filtrerHistorique(filtre) {
  filtreActif = filtre;
  var btns = ['tous','utilisation','achat'];
  var colors = {'tous':'#1a56db','utilisation':'#1a56db','achat':'#7c3aed'};
  for (var i = 0; i < btns.length; i++) {
    var btn = document.getElementById('btn-' + btns[i]);
    var isActive = btns[i] === filtre;
    btn.style.background = isActive ? colors[btns[i]] : 'white';
    btn.style.color = isActive ? 'white' : colors[btns[i]];
  }
  afficherHistorique();
}

function afficherHistorique() {
  var container = document.getElementById('historique-unifie');

  // Fusionner et trier par date décroissante
  var items = [];
  for (var i = 0; i < entrees.length; i++) {
    items.push({type:'utilisation', data: entrees[i]});
  }
  for (var i = 0; i < achats.length; i++) {
    items.push({type:'achat', data: achats[i]});
  }
  items.sort(function(a, b) { return b.data.id - a.data.id; });

  // Appliquer filtre
  if (filtreActif !== 'tous') {
    items = items.filter(function(x) { return x.type === filtreActif; });
  }

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state">Aucune entrée pour le moment.</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var e = item.data;
    var isAchat = item.type === 'achat';
    var tags = '';
    for (var j = 0; j < e.produits.length; j++) {
      if (isAchat) {
        tags += '<span class="produit-tag-achat">🛒 ' + e.produits[j].nom + ' +' + e.produits[j].qte + ' unité(s)</span>';
      } else {
        tags += '<span class="produit-tag">📦 ' + e.produits[j].nom + ' −' + e.produits[j].qte + ' unité(s)</span>';
      }
    }
    var itemClass = isAchat ? 'history-item-achat' : 'history-item';
    var deleteBtn = isAchat
      ? '<button onclick="supprimerAchat(' + e.id + ')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;font-size:0.85rem;">🗑️</button>'
      : '<button onclick="supprimerEntree(' + e.id + ')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;font-size:0.85rem;">🗑️</button>';
    var typeBadge = isAchat
      ? '<span class="badge achat">🛒 Achat</span>'
      : '<span class="badge chantier">🏗️ ' + (e.chantier || '') + '</span>';
    var personneBadge = isAchat
      ? '<span class="badge">👤 ' + e.responsable + '</span>'
      : '<span class="badge">👷 ' + e.ouvrier + '</span>';
    html += '<div class="' + itemClass + '">' +
      '<div class="history-meta" style="justify-content:space-between;align-items:center;">' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
          '<span class="badge date">📅 ' + formatDate(e.date) + '</span>' +
          typeBadge + personneBadge +
        '</div>' + deleteBtn +
      '</div><div>' + tags + '</div></div>';
  }
  container.innerHTML = html;
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function exporterCSV() {
  if (entrees.length === 0 && achats.length === 0) { alert('Aucune donnée à exporter.'); return; }

  var wb = XLSX.utils.book_new();

  // ---- Feuille 1 : Historique complet (utilisations + achats triés par date) ----
  var hist = [['Date','Type','Chantier / Responsable','Produit','Quantité','Enregistré le']];
  var items = [];
  for (var i = 0; i < entrees.length; i++) {
    var e = entrees[i];
    for (var j = 0; j < e.produits.length; j++) {
      items.push({id: e.id, date: e.date, type:'Utilisation', qui: (e.chantier + ' / ' + e.ouvrier), nom: e.produits[j].nom, qte: -e.produits[j].qte, ts: e.timestamp});
    }
  }
  for (var i = 0; i < achats.length; i++) {
    var a = achats[i];
    for (var j = 0; j < a.produits.length; j++) {
      items.push({id: a.id, date: a.date, type:'Achat', qui: a.responsable, nom: a.produits[j].nom, qte: +a.produits[j].qte, ts: a.timestamp});
    }
  }
  items.sort(function(a,b){ return a.id - b.id; });
  for (var i = 0; i < items.length; i++) {
    hist.push([formatDate(items[i].date), items[i].type, items[i].qui, items[i].nom, items[i].qte, items[i].ts]);
  }
  var ws1 = XLSX.utils.aoa_to_sheet(hist);
  ws1['!cols'] = [{wch:12},{wch:13},{wch:28},{wch:35},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Historique complet');

  // ---- Feuille 2 : Variation des stocks ----
  // Stock initial = valeurs du fichier source (avant toute opération)
  var STOCK_INITIAL = {
    "AMPHIKLIN SOLAR PROTECT":8,"ANTIGRAFITY 2010 2L":14,"ANTIGRAFITY 2030 5L":6,
    "ANTISTAKLIN (10 L)":19,"Asept 90":23,"Bidons vides blancs (25L)":53,
    "Bidons vides bleus (10L)":140,"Bidons vides bleus (20L)":139,"Bidons vides bleus (25L)":62,
    "DECAP PEINTURE GUARD (5L)":16,"DECAPSOLGUARD (25L)":4.5,"DECAPSOLGUARD (IG Pro 20 L)":2,
    "DEGRA CLEAN":3,"DEGRAISSANT HB":13,"Decap Cire Guard (5kg)":2,
    "ECHANTILLON ENZYKLIN+ 5L":23,"ENZYKLIN+ (10 L)":41,"ENZYKLIN+ (20 L)":30,
    "ENZYKLIN+ (25L)":34,"ENZYKLIN+IBC VRAC":2,"Enzyklin IBC (1000L)":1,
    "GRAFIKLIN (5L)":7,"GUARD REMOVER":1,"HP Green":14,"HYPO 30L":6,
    "ImperGuard Pro (20 L)":11,"KEC":15,"KUVYKLIN ECO 10 KG":27,
    "PROTECTGUARD MG PRO":24,"PROTECTKLIN 3+":9,"PROTECTKLIN 4+ (20 L)":21,
    "PROTECTKLIN2+ (20L)":9,"ProtectGuard Pro (PG Pro 25 L)":4,
    "Protectguard EM 5kg":1,"WASHGUARD EXPRESS (20L)":6
  };

  // Calculer total utilisé et total acheté par produit
  var totalUtilise = {};
  var totalAchete = {};
  for (var i = 0; i < entrees.length; i++) {
    for (var j = 0; j < entrees[i].produits.length; j++) {
      var n = entrees[i].produits[j].nom;
      totalUtilise[n] = (totalUtilise[n] || 0) + entrees[i].produits[j].qte;
    }
  }
  for (var i = 0; i < achats.length; i++) {
    for (var j = 0; j < achats[i].produits.length; j++) {
      var n = achats[i].produits[j].nom;
      totalAchete[n] = (totalAchete[n] || 0) + achats[i].produits[j].qte;
    }
  }

  var stock = [['Produit','Stock initial','Qté achetée','Qté utilisée','Stock final']];
  for (var k = 0; k < PRODUITS.length; k++) {
    var nom = PRODUITS[k].nom;
    var si = STOCK_INITIAL[nom] !== undefined ? STOCK_INITIAL[nom] : 0;
    var achete = totalAchete[nom] || 0;
    var utilise = totalUtilise[nom] || 0;
    var final = si + achete - utilise;
    stock.push([nom, si, achete, utilise, final]);
  }
  // Produits hors liste (Autre)
  var tousNoms = {};
  for (var n in totalUtilise) tousNoms[n] = true;
  for (var n in totalAchete) tousNoms[n] = true;
  for (var n in tousNoms) {
    var found = false;
    for (var k = 0; k < PRODUITS.length; k++) { if (PRODUITS[k].nom === n) { found = true; break; } }
    if (!found) {
      var achete = totalAchete[n] || 0;
      var utilise = totalUtilise[n] || 0;
      stock.push([n, '?', achete, utilise, '?']);
    }
  }

  var ws2 = XLSX.utils.aoa_to_sheet(stock);
  ws2['!cols'] = [{wch:35},{wch:14},{wch:14},{wch:14},{wch:14}];
  // Colorier stock final négatif en rouge
  for (var r = 1; r < stock.length; r++) {
    var cellRef = XLSX.utils.encode_cell({r: r, c: 4});
    if (ws2[cellRef] && typeof ws2[cellRef].v === 'number') {
      if (ws2[cellRef].v < 0) {
        ws2[cellRef].s = {font:{bold:true,color:{rgb:'DC2626'}}, fill:{fgColor:{rgb:'FFEEEE'}}};
      } else if (ws2[cellRef].v === 0) {
        ws2[cellRef].s = {font:{bold:true,color:{rgb:'D97706'}}, fill:{fgColor:{rgb:'FFFBEB'}}};
      } else {
        ws2[cellRef].s = {font:{bold:true,color:{rgb:'16A34A'}}, fill:{fgColor:{rgb:'ECFDF5'}}};
      }
    }
  }
  XLSX.utils.book_append_sheet(wb, ws2, 'Variation des stocks');

  XLSX.writeFile(wb, 'stock_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

ajouterProduit();
afficherHistorique();
document.getElementById('date-achat').valueAsDate = new Date();
ajouterAchat();
